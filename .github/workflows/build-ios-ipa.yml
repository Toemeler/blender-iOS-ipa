# Builds Blender's experimental "ios" branch into a sideloadable (unsigned) IPA.
# - On success: publishes the IPA as a GitHub Release (and as a run artifact).
# - On failure: commits a condensed error log to ci-logs/ in this repo,
#   so the build can be debugged remotely via the GitHub API.

name: Build Blender iOS IPA

on:
  workflow_dispatch:
    inputs:
      extra_cmake_args:
        description: "Extra CMake args (debugging knob, optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-ipa:
    name: Build Blender (ios branch) for iPadOS
    runs-on: macos-15
    timeout-minutes: 350

    steps:
      - name: Clone Blender ios branch from blender.org WITH Git LFS (real datafiles)
        run: |
          git lfs install
          git clone --depth 2 --branch ios https://projects.blender.org/blender/blender.git blender
          cd blender && git checkout d9b6fe34ddce527d93b97c0bf42ad92cebac4e4e && git lfs pull
          echo "startup.blend bytes: $(wc -c < release/datafiles/startup.blend) (must be >100000, not 131)"

      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          cmake --version
          python3 --version
          git lfs install

      - name: Cache precompiled dependency libraries
        uses: actions/cache@v4
        with:
          path: |
            blender/lib/ios_arm64
            blender/lib/macos_arm64
          key: blender-ios-libs-v1

      - name: Fetch assets + precompiled libraries (iOS + macOS host tools)
        working-directory: blender
        run: |
          set -o pipefail
          python3 ./build_files/utils/make_update.py --no-blender --use-ios-libraries 2>&1 | tee update.log

      - name: "Patch sources build-31 (skip volume kernels, no MetalRT, kernel export/seed)"
        run: |
          echo '' | base64 -d > /tmp/fix_all_v27.py
          python3 /tmp/fix_all_v27.py

      - name: "Patch sources build-32 (native diffraction grating BSDF: CPU + Metal GPU)"
        run: |
          echo '' | base64 -d > /tmp/fix_all_v28.py
          python3 /tmp/fix_all_v28.py

      - name: "Patch sources build-36 (bundle Spectral Wave Optics engine: selectable next to Cycles/EEVEE)"
        run: |
          echo '' | base64 -d > /tmp/add_spectral_engine.py
          python3 /tmp/add_spectral_engine.py

      - name: "Patch sources build-37 (external mouse PC parity: L/M/R buttons + real wheel)"
        run: |
          echo '' | base64 -d > /tmp/fix_mouse_v37.py
          python3 /tmp/fix_mouse_v37.py

      - name: "Patch sources build-39 (numpad, raw-touch M/R buttons, RMB drag-cancel, mouse/stylus hover split, spectral diagnostics)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v39.py
          python3 /tmp/fix_input_v39.py

      - name: "Patch sources build-40 (cursor motion during middle/right drags)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v40.py
          python3 /tmp/fix_input_v40.py

      - name: "Patch sources build-41 (GCMouse raw deltas: motion during middle/right drags)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v41.py
          python3 /tmp/fix_input_v41.py

      - name: "Patch sources build-42 (export CPython API symbols for numpy flat-namespace binding)"
        run: |
          echo '' | base64 -d > /tmp/fix_python_v42.py
          python3 /tmp/fix_python_v42.py

      - name: "Patch sources build-44 (GC handlers pinned to primary window + delta logs)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v44.py
          python3 /tmp/fix_input_v44.py

      - name: "Patch sources build-46 (phantom-LEFT gate + tracking-mode-safe M/R drag motion)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v46.py
          python3 /tmp/fix_input_v46.py

      - name: "Patch sources build-48 (DIAGNOSTIC: WM event/handler tracing to console log)"
        run: |
          echo '' | base64 -d > /tmp/fix_diag_v48.py
          python3 /tmp/fix_diag_v48.py

      - name: "Patch sources build-49 (per-frame UITouch polling for M/R drags + motion trace)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v49.py
          python3 /tmp/fix_input_v49.py

      - name: "Patch sources build-50 (middle-drag -> trackpad pan events)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v50.py
          python3 /tmp/fix_input_v50.py

      - name: "Patch sources build-51 (two-finger pan flag + iOS navigation gate)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v51.py
          python3 /tmp/fix_input_v51.py

      - name: "Patch sources build-52 (middle-click echo guard + UI click diagnostic)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v52.py
          python3 /tmp/fix_input_v52.py

      - name: "Patch sources build-53 (hit-test probe + region self-heal)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v53.py
          python3 /tmp/fix_input_v53.py

      - name: "Patch sources build-54 (remove v53 recovery + panel-geometry probe)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v54.py
          python3 /tmp/fix_input_v54.py

      - name: "Patch sources build-55 (FIX: left-button echo guard -- Add Modifier dead click)"
        run: |
          echo '' | base64 -d > /tmp/fix_input_v55.py
          python3 /tmp/fix_input_v55.py

      - name: Configure (CMake, Xcode generator, iOS device target)
        run: |
          set -o pipefail
          cmake -S blender -B build_ios -G Xcode \
            -DAPPLE_TARGET_DEVICE=ios \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DCMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM="" \
            ${{ inputs.extra_cmake_args }} 2>&1 | tee configure.log

      - name: Build and assemble Blender.app
        run: |
          set -o pipefail
          cmake --build build_ios --config Release --target install -- -quiet -jobs 3 2>&1 | tee build.log

      - name: Add Blender app icon (non-fatal)
        continue-on-error: true
        run: |
          set +e
          APP=$(find build_ios -type d -name "Blender.app" | grep -Ei "iphoneos|Release" | head -1)
          [ -z "$APP" ] && APP=$(find build_ios -type d -name "Blender.app" | head -1)
          [ -z "$APP" ] && { echo 'no app bundle; skip icon'; exit 0; }
          python3 -m pip install --quiet --break-system-packages pillow cairosvg 2>/dev/null || pip3 install --quiet pillow cairosvg 2>/dev/null || true
          echo '' | base64 -d > /tmp/mkicon.py
          python3 /tmp/mkicon.py "$APP" "blender/release/datafiles/icons_svg/blender.svg" || true
          exit 0

      - name: "Replace macOS numpy with iOS-native numpy (build-40)"
        run: |
          set -euxo pipefail
          # Root cause from on-device spectral_startup.log: dlopen refused
          # numpy's C extensions with "have 'macOS', need 'iOS'" - the host
          # (macOS) numpy was copied into the app. Swap in BeeWare's real
          # arm64 iphoneos build of numpy for CPython 3.11.
          APP=$(find build_ios -type d -name "Blender.app" | grep -Ei "iphoneos|Release" | head -1)
          if [ -z "$APP" ]; then APP=$(find build_ios -type d -name "Blender.app" | head -1); fi
          test -n "$APP"
          SP="$APP/Assets/5.0/python/lib/python3.11/site-packages"
          test -d "$SP/numpy"
          curl -fL --retry 3 -o /tmp/numpy-ios.whl             "https://pypi.anaconda.org/beeware/simple/numpy/1.26.2/numpy-1.26.2-cp311-cp311-ios_13_0_arm64_iphoneos.whl"
          echo "b6c8d7e17615a0220e1fa5e4dab592bd703b38e845ee657e747e400306730e9e  /tmp/numpy-ios.whl" | shasum -a 256 -c -
          rm -rf "$SP/numpy" "$SP"/numpy-*.dist-info
          unzip -q /tmp/numpy-ios.whl -d "$SP"
          # Blender's bundled Python was built with the macOS EXT_SUFFIX, so
          # its importer only finds *.cpython-311-darwin.so; rename the iOS
          # libs to that suffix (dlopen checks the Mach-O platform inside,
          # not the filename).
          N=0
          for so in $(find "$SP/numpy" -name "*.cpython-311-iphoneos.so"); do
            mv "$so" "${so%.cpython-311-iphoneos.so}.cpython-311-darwin.so"
            N=$((N+1))
          done
          echo "renamed $N extension libs"
          test "$N" -ge 15
          # static libs and tests are dead weight and can upset on-device signers
          find "$SP/numpy" -name "*.a" -delete
          rm -rf "$SP/numpy/tests" "$SP"/numpy/*/tests
          # build-42: the wheel's extensions link @rpath/Python.framework/Python,
          # which does not exist (Blender embeds CPython statically). Rewrite
          # their bind opcodes to flat-namespace lookup so the symbols resolve
          # from the Blender executable's exports, and retarget the framework
          # load command to libSystem (guaranteed present). Then re-sign ad hoc
          # since the byte patch invalidates the wheel's signatures.
          # (the repo itself is not checked out in this workflow - only the
          # Blender clone - so the patcher ships base64-embedded like every
          # other patch; the repo copy is for review/history)
          echo '' | base64 -d > /tmp/numpy_flat_namespace.py
          python3 /tmp/numpy_flat_namespace.py "$SP/numpy"
          find "$SP/numpy" -name "*.so" -exec codesign -f -s - {} \;
          du -sh "$SP/numpy"

      - name: Package IPA
        run: |
          set -x
          APP=$(find build_ios -type d -name "Blender.app" | grep -Ei "iphoneos|Release" | head -1)
          if [ -z "$APP" ]; then APP=$(find build_ios -type d -name "Blender.app" | head -1); fi
          test -n "$APP" || { echo "Blender.app not found"; exit 1; }
          echo "Found app bundle: $APP"
          # build-31: pack device-exported kernel archives (if committed) into the app
          if [ -d prebuilt-kernels ]; then
            echo "Packing prebuilt kernel seed:"; du -sh prebuilt-kernels
            cp -R prebuilt-kernels "$APP/cycles-kernels-seed"
          fi
          # Strip non-runtime build artifacts: on-device signers (LiveContainer,
          # SideStore, Impactor) try to sign every Mach-O in the bundle and fail
          # on object files like python.o. These are linker leftovers, not needed
          # at runtime, so removing them is safe.
          echo "Removing *.o / *.a build artifacts:"
          find "$APP" \( -name "*.o" -o -name "*.a" \) -print -delete || true

          # Bundle ALL dependency dylibs where the binary's @rpath looks: Assets/lib.
          # The branch stubs this out for iOS (IOS_FIXME) and only copies libs when
          # a codesigning identity exists, which it doesn't on a CI runner -- so the
          # app crashes at launch with "Library not loaded: @rpath/libz.1.dylib".
          # We copy them ourselves; Impactor re-signs everything on-device anyway.
          LIBDST="$APP/Assets/lib"
          mkdir -p "$LIBDST"
          IOSLIB=""
          for d in blender/lib/ios_arm64 blender/lib/ios_*; do
            [ -d "$d" ] && IOSLIB="$d" && break
          done
          echo "iOS precompiled lib dir: ${IOSLIB:-NOT_FOUND}"
          if [ -n "$IOSLIB" ]; then
            # -L dereferences version symlinks (libz.1.dylib -> libz.1.3.dylib) so the
            # exact soname the binary requests exists as a real file in the bundle.
            find "$IOSLIB" -name '*.dylib' \( -type f -o -type l \) -exec cp -fL {} "$LIBDST/" \; || true
          fi
          # Python's shared lib is dlopened by Blender too; make sure it's reachable.
          find "$APP" -name 'libpython*.dylib' -exec cp -fn {} "$LIBDST/" \; 2>/dev/null || true
          echo "dylibs now in Assets/lib: $(find "$LIBDST" -maxdepth 1 -name '*.dylib' | wc -l | tr -d ' ')"
          echo "libz present: $(ls "$LIBDST"/libz*.dylib 2>/dev/null || echo NO)"

          # Ad-hoc signature: Sideloadly/AltStore re-signs with the user's Apple ID.
          codesign --force --deep --sign - "$APP" || true

          mkdir -p Payload
          cp -R "$APP" Payload/
          # Remove dangling symlinks, then zip while DEREFERENCING the rest
          # (note: no -y flag) so the resulting IPA contains zero symlink
          # entries. Windows signing tools like Impactor need a special
          # privilege to create symlinks during extraction and otherwise
          # fail with "os error 1314 / A required privilege is not held".
          find Payload -type l ! -exec test -e {} \; -delete || true
          echo "Symlinks left in Payload: $(find Payload -type l | wc -l | tr -d ' ')"
          zip -qr Blender-ios.ipa Payload
          ls -lh Blender-ios.ipa

      - name: Upload IPA as run artifact (non-fatal, short retention)
        # Account-wide artifact storage quota must never kill a finished build -
        # the GitHub Release below is the real distribution channel.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Blender-ios-ipa
          path: Blender-ios.ipa
          if-no-files-found: error
          retention-days: 1

      - name: Publish IPA as a GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "build-${{ github.run_number }}" Blender-ios.ipa \
            --repo "${{ github.repository }}" \
            --title "Blender iOS build #${{ github.run_number }}" \
            --notes "Unsigned IPA built from blender/blender@ios (run ${{ github.run_id }}). Sideload with Sideloadly or AltStore. Free Apple ID = 7-day expiry."

      - name: Commit condensed failure log to repo (remote debugging)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "== RUN ${{ github.run_id }} attempt ${{ github.run_attempt }} on $(sw_vers -productVersion) / $(xcodebuild -version | tr '\n' ' ') =="
            echo; echo "===== update.log (tail) ====="; tail -n 60 blender/update.log 2>/dev/null
            echo; echo "===== configure.log (tail) ====="; tail -n 120 configure.log 2>/dev/null
            echo; echo "===== build.log error lines ====="; grep -inE "error[: ]|fatal error|ld: " build.log 2>/dev/null | tail -n 150
            echo; echo "===== build.log (tail) ====="; tail -n 200 build.log 2>/dev/null
            echo; echo "===== CMakeError.log (tail) ====="; tail -n 80 build_ios/CMakeFiles/CMakeError.log 2>/dev/null
          } > failure-report.txt || true
          gh api -X PUT "repos/${{ github.repository }}/contents/ci-logs/run-${{ github.run_id }}-a${{ github.run_attempt }}.txt" \
            -f message="CI failure log (run ${{ github.run_id }})" \
            -f content="$(base64 -i failure-report.txt | tr -d '\n')" || true

      - name: Upload full debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            build.log
            configure.log
            blender/update.log
            build_ios/CMakeCache.txt
            build_ios/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
